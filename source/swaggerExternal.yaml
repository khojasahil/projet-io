    ValidationMessage:
      type: object
      properties:
        path:
          type: string
        rule:
          type: string
        error:
          type: object
          properties:
            code:
              type: number
            en:
              type: string
            fr:
              type: string
        type:
          type: string
          enum:
            - reject
            - warning
    Validations:
      type: object
      properties:
        reportingEntityBulkReference:
          type: string
        processedDate:
          type: string
          example: 2020-11-19T23:59:59-05:00
        status:
          type: object
          properties:
            code:
              type: number
              enum:
                - 1000
                - 2001
                - 2101
                - 2102
                - 4000
                - 5000
                - 5004
                - 5005
                - 5011
                - 5012
                - 5013
                - 5014
                - 5015
                - 5016
                - 5017
                - 5018
                - 5019
                - 5020
                - 2021
                - 5022
                - 5023
              description: "* 1000 - Success (All reports OK) / Réussi (Toutes les déclarations sont valides)\n* 2001 - Success with warnings (Some reports with warnings) / Réussi avec avertissements (Certaines déclarations ont des avertissements)\n* 2101 - Received / Reçu\n* 2102 - Processing / En traitement                \n* 4000 - Success with errors (Some reports with errors) / Réussi avec erreurs (Certaines déclarations ont des erreurs)\n* 5000 - Please contact Fintrac at tech@fintrac-canafe.gc.ca / Veuillez contacter Fintrac à tech@fintrac-canafe.gc.ca\n* 5004 - The Reporting Entity Number is missing, please re-submit the bulk reports after providing the RE#. / Le numéro de l’entité déclarante est absent, veuillez resoumettre le lot de déclarations après avoir inclut le numéro d’ED.\n* 5005 - The bulk reference number used in the bulk submitted already exists. Please review the bulk number to ensure it is unique. / Le numéro de référence de lot soumis existe déjà. Veuillez réviser le numéro de référence du lot pour vous assurer qu’il soit unique.\n* 5011 - The Report Type Code is invalid. / Le code de type de déclaration est invalide.\n* 5012 - The report reference number is being used more than once in the reports included in this submission. Please review the reports to ensure that each one has a unique reference number. / Le numéro de référence de déclarations est utilisé plus d’une fois dans les déclarations soumises. Veuillez réviser les déclarations et vous assurer que chacune des déclarations sous a un numéro de référence qui est unique.\n* 5013 - The Submission Type Code is invalid. / Le code de type de soumission est invalide.\n* 5014 - The report you are attempting to modify has not previously been received by FINTRAC. Please ensure that the report you are updating was successfully submitted. / La déclaration que vous tentez de modifier n’a pas été reçue par CANAFE. Veuillez vous assurer que la déclaration pour vous mettez à jour nous a été soumise avec succès.\n* 5015 - The policy validation failed. Please ensure that you have the authority to submit these reports to FINTRAC. / La validation de la politique a échouée. Veuillez vous assurer que vous avez l’autorité de soumettre ces déclarations à CANAFE.\n* 5016 - The number for the entity submitting the report is invalid. This number can either be the Reporting Entity Number or the Service Provider Entity Number. / Le numéro de l’entité soumettant la déclaration est invalide. Ce numéro correspond au numéro de l’entité déclarante ou le numéro du fournisseurs de services.\n* 5017 - The JSON document is invalid. / Le document JSON est invalide.\n* 5018 - One or more of the referenced definitions used in this report is missing from the definition list. / \tAu moins une des définitions utilisées dans la déclaration est absente de la liste des définitions.\n* 5019 - The Reporting Entity Number in the report is invalid. Please confirm that you are using the number that corresponds to the Reporting Entity for this report. / Le numéro de l’entité déclarante dans la déclaration est invalide. Veuillez confirmer que le numéro que vous utilisez correspond à l’entité déclarante pour cette déclaration.\n* 5020 - The bulk file submitted does not contain any reports. / Le document du lot ne contient aucune déclarations.\n* 5021 - The reportingEntityBulkReference provided is invalid. / Le reportingEntityBulkReference fournit est invalide.\n* 5022 - The bulk file submitted contains schema errors. / Le document du lot contient des erreurs de schéma.\n* 5023 - The bulk file submitted contains an invalid reportingEntityBulkReference. / Le document du lot contient un reportingEntityReportReference non valide.\n"
            en:
              type: string
            fr:
              type: string
