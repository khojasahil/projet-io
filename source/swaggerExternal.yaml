            - 4
            - 5
          description: |
            * `1` - Beneficiary / Bénéficiaire
            * `3` - On behalf of (i.e. 3rd party) / Pour le compte de (c.-à-d. un tiers)
            * `4` - Not applicable / Sans objet
            * `5` - Requester / Demandeur
        periodStart:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}[\\\\-\\\\+][0-9]{2}:[0-9]{2}$"
          example: 2020-11-19T00:00:00-05:00
        periodEnd:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}[\\\\-\\\\+][0-9]{2}:[0-9]{2}$"
          example: 2020-11-19T23:59:59-05:00
    cdrTwentyFourHourRule:
