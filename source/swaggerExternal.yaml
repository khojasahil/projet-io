    reportTypeCode:
      type: integer
      enum:
        - 14
        - 102
        - 106
        - 113
        - 145
      description: |
        * `14` - Large Virtual Currency Transaction Report (LVCTR) / Déclaration d'opérations importantes en monnaie virtuelle (DOIMV)
        * `102` - Suspicious transaction report (STR) / Décl. d'opérations douteuses (DOD)
        * `106` - Large cash transaction report (LCTR) / Décl. d'opér. importantes en esp. (DOIE)
        * `113` - Casino disbursement report (CDR) / Déclaration relative à un déboursement de casino (DDC)
        * `145` - Electronic funds transfer report (EFTR) / Déclaration de télévirement
    submitTypeCode:
      type: integer
      enum:
        - 1
        - 2
        - 5
      description: "* 1 - Submit / Soumettre\n* 2 - Update / Mise à jour\n* 5 - Delete / Supprimer    \n"
    externalReportReference:
      type: string
      pattern: "^[A-Za-z0-9-_]{1,100}$"
    externalTransactionReference:
      type: string
      pattern: "^[A-Za-z0-9-_]{1,200}$"
